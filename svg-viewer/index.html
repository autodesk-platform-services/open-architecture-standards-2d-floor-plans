<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAS SVG Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="glass-panel">
        <div class="logo">
            <h1>OAS Viewer</h1>
            <span class="version">v1.0</span>
        </div>
        <div class="controls">
            <label for="file-upload" class="btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                Upload JSON
            </label>
            <input id="file-upload" type="file" accept=".json"/>
        </div>
    </header>
    <main id="viewer-container">
        <div id="empty-state" class="empty-state">
            <div class="icon-box">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
            </div>
            <h2>No Plan Loaded</h2>
            <p>Upload an Open Architecture Standards (OAS) JSON file to visualize the layout.</p>
        </div>
        <div id="svg-wrapper" class="hidden">
            <svg id="plan-svg" xmlns="http://www.w3.org/2000/svg"></svg>
            <div class="zoom-controls glass-panel">
                <button id="zoom-in" title="Zoom In">+</button>
                <button id="zoom-out" title="Zoom Out">-</button>
                <button id="fit-view" title="Fit to Screen">Fit</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
